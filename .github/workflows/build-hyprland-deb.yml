name: Build Hyprland & Aquamarine (Anland) from Debian source

on:
  workflow_dispatch:
    inputs:
      aquamarine_version:
        description: 'Aquamarine Debian version (e.g. 0.11.0-2~bpo13+1)'
        required: true
        default: '0.11.0-2~bpo13+1'
      hyprland_version:
        description: 'Hyprland Debian version (e.g. 0.55.2+ds-1~bpo13+1)'
        required: true
        default: '0.55.2+ds-1~bpo13+1'
      clean_cache:
        description: 'Clean all caches and rebuild from scratch'
        required: false
        default: 'false'
        type: boolean

env:
  DEBIAN_FRONTEND: noninteractive
  AQUA_SRC: aquamarine
  HYPR_SRC: hyprland
  HYPR_PATCH: hyprland-anland.patch

jobs:
  build-all:
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:trixie-slim
      options: --privileged --user root

    steps:
      # ==========================================================
      # 1. 设置 Debian 源（优先使用 backports）
      # ==========================================================
      - name: Setup sources
        run: |
          cat > /etc/apt/sources.list << 'EOF'
          deb http://deb.debian.org/debian trixie main
          deb http://deb.debian.org/debian trixie-updates main
          deb http://deb.debian.org/debian-security trixie-security main
          deb http://deb.debian.org/debian trixie-backports main
          deb-src http://deb.debian.org/debian trixie main
          deb-src http://deb.debian.org/debian trixie-updates main
          deb-src http://deb.debian.org/debian-security trixie-security main
          deb-src http://deb.debian.org/debian trixie-backports main
          EOF
          # 删除可能存在的重复源文件
          rm -f /etc/apt/sources.list.d/debian.sources 2>/dev/null || true
          # 配置 APT 优先从 backports 安装
          cat > /etc/apt/apt.conf.d/99backports << 'EOF'
          APT::Default-Release "trixie";
          EOF
          apt-get update

      # ==========================================================
      # 2. 生成 APT 哈希
      # ==========================================================
      - name: Generate APT package list hash
        id: apt-hash
        run: |
          cat > /tmp/apt-packages.txt << 'EOF'
          devscripts build-essential fakeroot dpkg-dev quilt debhelper-compat
          cmake pkg-config git wget curl ca-certificates gnupg
          libxkbcommon-dev wayland-protocols
          EOF
          PACKAGE_HASH=$(sha256sum /tmp/apt-packages.txt | cut -c1-16)
          echo "package_hash=${PACKAGE_HASH}" >> $GITHUB_OUTPUT

      # ==========================================================
      # 3. APT 缓存
      # ==========================================================
      - name: Cache APT packages
        id: apt-cache
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives/*.deb
            /var/lib/apt/lists
          key: apt-all-${{ runner.arch }}-${{ steps.apt-hash.outputs.package_hash }}
          restore-keys: |
            apt-all-${{ runner.arch }}-

      # ==========================================================
      # 4. 安装基础构建工具
      # ==========================================================
      - name: Install base tools
        run: |
          apt-get install -y --no-install-recommends \
            devscripts build-essential fakeroot dpkg-dev quilt \
            cmake pkg-config git wget curl ca-certificates gnupg

      # ==========================================================
      # 5. 从 backports 安装较新的依赖
      # ==========================================================
      - name: Install backports dependencies
        run: |
          # 从 backports 安装 libxkbcommon-dev 和 wayland-protocols
          apt-get install -y -t trixie-backports --no-install-recommends \
            libxkbcommon-dev wayland-protocols \
            || echo "Some backports packages may already be installed"

      # ==========================================================
      # 6. 检出仓库（获取补丁）
      # ==========================================================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: repo
          fetch-depth: 1

      # ==========================================================
      # 7. 生成补丁哈希
      # ==========================================================
      - name: Generate patch hash
        id: patch-hash
        run: |
          if [ -f "repo/${{ env.HYPR_PATCH }}" ]; then
            HASH=$(sha256sum "repo/${{ env.HYPR_PATCH }}" | cut -c1-16)
          else
            HASH="no-patch"
          fi
          echo "hypr_patch_hash=${HASH}" >> $GITHUB_OUTPUT

      # ==========================================================
      # 第一部分：构建 Aquamarine（Anland 版本，源码已包含）
      # ==========================================================

      # ---------- 8. Aquamarine 源码缓存 ----------
      - name: Cache Aquamarine source
        id: aqua-src-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.AQUA_SRC }}-*
          key: src-aqua-${{ inputs.aquamarine_version }}
          restore-keys: |
            src-aqua-${{ inputs.aquamarine_version }}-
            src-aqua-

      # ---------- 9. 获取 Aquamarine 源码 ----------
      - name: Fetch Aquamarine source
        if: steps.aqua-src-cache.outputs.cache-hit != 'true'
        run: |
          apt-get source ${{ env.AQUA_SRC }}=${{ inputs.aquamarine_version }}

      - name: Find Aqua source dir
        id: aqua-src-dir
        run: |
          SRCDIR=$(find . -maxdepth 1 -type d -name "${{ env.AQUA_SRC }}-*" | head -1)
          echo "srcdir=${SRCDIR}" >> $GITHUB_OUTPUT
          echo "srcdir=${SRCDIR}"

      # ---------- 10. 修改 Aquamarine changelog ----------
      - name: Bump Aquamarine changelog
        if: steps.aqua-src-cache.outputs.cache-hit != 'true'
        run: |
          cd ${{ steps.aqua-src-dir.outputs.srcdir }}
          VER=$(dpkg-parsechangelog --show-field Version)
          NEW_VER="${VER}+anland1"
          dch --newversion "$NEW_VER" "Anland backend (CI build)"
          echo "Aqua version: $NEW_VER"

      # ---------- 11. 安装 Aquamarine build-dep ----------
      - name: Install Aquamarine build dependencies
        run: |
          cd ${{ steps.aqua-src-dir.outputs.srcdir }}
          apt-get build-dep -y ./ || apt-get build-dep -y ${{ env.AQUA_SRC }}

      # ---------- 12. 构建 Aquamarine .deb ----------
      - name: Build Aquamarine .deb
        run: |
          cd ${{ steps.aqua-src-dir.outputs.srcdir }}
          dpkg-buildpackage -b -uc -us -d -j$(nproc)

      # ---------- 13. 安装 Aquamarine .deb ----------
      - name: Install Aquamarine .deb
        run: |
          ls -la ./*aquamarine*.deb 2>/dev/null || echo "No aquamarine debs found"
          dpkg -i ./*aquamarine*.deb || apt-get install -f -y
          dpkg -i ./*aquamarine*.deb

      # ==========================================================
      # 第二部分：构建 Hyprland（打 Anland 补丁）
      # ==========================================================

      # ---------- 14. Hyprland 源码缓存 ----------
      - name: Cache Hyprland source
        id: hypr-src-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.HYPR_SRC }}-*
          key: src-hypr-${{ inputs.hyprland_version }}-${{ steps.patch-hash.outputs.hypr_patch_hash }}
          restore-keys: |
            src-hypr-${{ inputs.hyprland_version }}-
            src-hypr-

      # ---------- 15. 获取 Hyprland 源码 ----------
      - name: Fetch Hyprland source
        if: steps.hypr-src-cache.outputs.cache-hit != 'true'
        run: |
          apt-get source ${{ env.HYPR_SRC }}=${{ inputs.hyprland_version }}

      - name: Find Hyprland source dir
        id: hypr-src-dir
        run: |
          SRCDIR=$(find . -maxdepth 1 -type d -name "${{ env.HYPR_SRC }}-*" | head -1)
          echo "srcdir=${SRCDIR}" >> $GITHUB_OUTPUT

      # ---------- 16. 应用 Hyprland Anland 补丁 ----------
      - name: Apply Anland patch to Hyprland
        if: steps.hypr-src-cache.outputs.cache-hit != 'true'
        run: |
          cd ${{ steps.hypr-src-dir.outputs.srcdir }}
          PATCH_FILE="${{ github.workspace }}/repo/${{ env.HYPR_PATCH }}"
          if [ -f "$PATCH_FILE" ]; then
            echo "Applying ${{ env.HYPR_PATCH }}..."
            patch -p1 --forward --reject-file=- < "$PATCH_FILE" || {
              echo "Patch may already be applied, continuing..."
            }
          else
            echo "⚠️ No patch file found at $PATCH_FILE, skipping"
          fi

      # ---------- 17. 修改 Hyprland changelog ----------
      - name: Bump Hyprland changelog
        if: steps.hypr-src-cache.outputs.cache-hit != 'true'
        run: |
          cd ${{ steps.hypr-src-dir.outputs.srcdir }}
          VER=$(dpkg-parsechangelog --show-field Version)
          NEW_VER="${VER}+anland1"
          dch --newversion "$NEW_VER" "Add Anland backend support (CI build)"
          echo "Hypr version: $NEW_VER"

      # ---------- 18. 安装 Hyprland build-dep（从 backports 解决依赖） ----------
      - name: Install Hyprland build dependencies
        run: |
          cd ${{ steps.hypr-src-dir.outputs.srcdir }}
          # 先尝试直接安装 build-dep
          apt-get build-dep -y ./ || {
            echo "build-dep failed, trying with backports..."
            # 如果失败，尝试从 backports 安装缺失的依赖
            apt-get install -y -t trixie-backports --no-install-recommends \
              libxkbcommon-dev wayland-protocols libdisplay-info-dev \
              libinput-dev hyprwayland-scanner hyprutils-dev \
              hyprlang-dev hyprcursor-dev hyprgraphics-dev \
              || echo "Some packages may already be installed"
            # 再次尝试
            apt-get build-dep -y ./
          }

      # ---------- 19. 构建 Hyprland .deb ----------
      - name: Build Hyprland .deb
        run: |
          cd ${{ steps.hypr-src-dir.outputs.srcdir }}
          dpkg-buildpackage -b -uc -us -d -j$(nproc)

      # ---------- 20. 收集所有 .deb ----------
      - name: Collect all artifacts
        run: |
          mkdir -p artifacts
          find . -maxdepth 1 -name "*.deb" -exec cp {} artifacts/ \;
          ls -la artifacts/

      # ---------- 21. 上传所有 .deb ----------
      - name: Upload all debs
        uses: actions/upload-artifact@v4
        with:
          name: anland-debs
          path: artifacts/*.deb
          retention-days: 7

      # ---------- 22. 构建摘要 ----------
      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Cache | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| APT | ${{ steps.apt-cache.outputs.cache-hit }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Aquamarine Source | ${{ steps.aqua-src-cache.outputs.cache-hit }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Hyprland Source | ${{ steps.hypr-src-cache.outputs.cache-hit }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Aquamarine: \`libaquamarine*_*+anland1_arm64.deb\`" >> $GITHUB_STEP_SUMMARY
          echo "- Hyprland: \`hyprland_*+anland1_arm64.deb\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Install" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "sudo dpkg -i libaquamarine*.deb hyprland*.deb" >> $GITHUB_STEP_SUMMARY
          echo "sudo apt-get install -f -y" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY