name: Build Hyprland (Anland) from Debian source

on:
  workflow_dispatch:
    inputs:
      aquamarine_version:
        description: 'Aquamarine Debian version (for build-dependency)'
        required: true
        default: '0.11.0-2~bpo13+1'
      hyprland_version:
        description: 'Hyprland Debian version (e.g. 0.55.2+ds-1~bpo13+1)'
        required: true
        default: '0.55.2+ds-1~bpo13+1'
      clean_cache:
        description: 'Clean all caches and rebuild from scratch'
        required: false
        default: 'false'
        type: boolean

env:
  DEBIAN_FRONTEND: noninteractive
  PATCH_DIR: ${{ github.workspace }}/patches
  AQUA_PATCH: aquamarine-anland.patch
  HYPR_PATCH: hyprland-anland.patch
  AQUA_SRC: aquamarine
  HYPR_SRC: hyprland

jobs:
  build-hyprland:
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:trixie-slim
      options: --privileged --user root

    steps:
      # ---------- 1. 设置源 ----------
      - name: Setup sources
        run: |
          cat > /etc/apt/sources.list << 'EOF'
          deb http://deb.debian.org/debian trixie main
          deb http://deb.debian.org/debian trixie-updates main
          deb http://deb.debian.org/debian-security trixie-security main
          deb http://deb.debian.org/debian trixie-backports main
          deb-src http://deb.debian.org/debian trixie main
          deb-src http://deb.debian.org/debian trixie-updates main
          deb-src http://deb.debian.org/debian-security trixie-security main
          deb-src http://deb.debian.org/debian trixie-backports main
          EOF
          apt-get update

      # ---------- 2. 生成 APT 哈希 ----------
      - name: Generate APT package list hash
        id: apt-hash
        run: |
          cat > /tmp/apt-packages.txt << 'EOF'
          devscripts build-essential fakeroot dpkg-dev quilt debhelper-compat
          cmake pkg-config git wget curl ca-certificates gnupg
          EOF
          PACKAGE_HASH=$(sha256sum /tmp/apt-packages.txt | cut -c1-16)
          echo "package_hash=${PACKAGE_HASH}" >> $GITHUB_OUTPUT

      # ---------- 3. APT 缓存 ----------
      - name: Cache APT packages
        id: apt-cache
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives/*.deb
            /var/lib/apt/lists
          key: apt-hypr-${{ runner.arch }}-${{ steps.apt-hash.outputs.package_hash }}
          restore-keys: |
            apt-hypr-${{ runner.arch }}-

      # ---------- 4. 安装基础工具 ----------
      - name: Install base tools
        run: |
          apt-get install -y --no-install-recommends \
            devscripts build-essential fakeroot dpkg-dev quilt \
            cmake pkg-config git wget curl ca-certificates gnupg

      # ---------- 5. 检出仓库（补丁） ----------
      - name: Checkout repository for patches
        uses: actions/checkout@v4
        with:
          path: repo
          fetch-depth: 1

      # ---------- 6. 生成补丁哈希 ----------
      - name: Generate patch hashes
        id: patch-hash
        run: |
          for p in ${{ env.AQUA_PATCH }} ${{ env.HYPR_PATCH }}; do
            if [ -f "repo/patches/$p" ]; then
              HASH=$(sha256sum "repo/patches/$p" | cut -c1-16)
            else
              HASH="no-patch"
            fi
            echo "${p}_hash=${HASH}" >> $GITHUB_OUTPUT
          done

      # ==========================================================
      # 第一部分：构建并安装 Aquamarine（Anland）
      # ==========================================================

      # ---------- 7. Aquamarine 源码缓存 ----------
      - name: Cache Aquamarine source
        id: aqua-src-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.AQUA_SRC }}-*
          key: src-aqua-${{ inputs.aquamarine_version }}-${{ steps.patch-hash.outputs.${{ env.AQUA_PATCH }}_hash }}
          restore-keys: |
            src-aqua-${{ inputs.aquamarine_version }}-

      # ---------- 8. 获取 Aquamarine 源码 ----------
      - name: Fetch Aquamarine source
        if: steps.aqua-src-cache.outputs.cache-hit != 'true'
        run: |
          apt-get source ${{ env.AQUA_SRC }}=${{ inputs.aquamarine_version }}

      - name: Find Aqua source dir
        id: aqua-src-dir
        run: |
          SRCDIR=$(find . -maxdepth 1 -type d -name "${{ env.AQUA_SRC }}-*" | head -1)
          echo "srcdir=${SRCDIR}" >> $GITHUB_OUTPUT

      # ---------- 9. 应用 Aquamarine 补丁 ----------
      - name: Apply Anland patch to Aquamarine
        if: steps.aqua-src-cache.outputs.cache-hit != 'true'
        run: |
          cd ${{ steps.aqua-src-dir.outputs.srcdir }}
          PATCH_FILE="${{ github.workspace }}/repo/patches/${{ env.AQUA_PATCH }}"
          if [ -f "$PATCH_FILE" ]; then
            patch -p1 --forward --reject-file=- < "$PATCH_FILE" || true
          fi

      # ---------- 10. 修改 Aquamarine changelog ----------
      - name: Bump Aquamarine changelog
        if: steps.aqua-src-cache.outputs.cache-hit != 'true'
        run: |
          cd ${{ steps.aqua-src-dir.outputs.srcdir }}
          VER=$(dpkg-parsechangelog --show-field Version)
          NEW_VER="${VER}+anland1"
          dch --newversion "$NEW_VER" "Add Anland backend support (CI build)"
          echo "Aqua version: $NEW_VER"

      # ---------- 11. 安装 Aquamarine build-dep ----------
      - name: Install Aquamarine build dependencies
        run: |
          cd ${{ steps.aqua-src-dir.outputs.srcdir }}
          apt-get build-dep -y ./ || apt-get build-dep -y ${{ env.AQUA_SRC }}

      # ---------- 12. 构建 Aquamarine .deb ----------
      - name: Build Aquamarine .deb
        run: |
          cd ${{ steps.aqua-src-dir.outputs.srcdir }}
          dpkg-buildpackage -b -uc -us -d -j$(nproc)

      # ---------- 13. 安装 Aquamarine .deb ----------
      - name: Install Aquamarine .deb
        run: |
          # 安装所有生成的 .deb（包括 libaquamarine10 和 -dev）
          dpkg -i ./${{ env.AQUA_SRC }}_*.deb || apt-get install -f -y
          dpkg -i ./${{ env.AQUA_SRC }}_*.deb

      # ==========================================================
      # 第二部分：构建 Hyprland（Anland）
      # ==========================================================

      # ---------- 14. Hyprland 源码缓存 ----------
      - name: Cache Hyprland source
        id: hypr-src-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.HYPR_SRC }}-*
          key: src-hypr-${{ inputs.hyprland_version }}-${{ steps.patch-hash.outputs.${{ env.HYPR_PATCH }}_hash }}
          restore-keys: |
            src-hypr-${{ inputs.hyprland_version }}-

      # ---------- 15. 获取 Hyprland 源码 ----------
      - name: Fetch Hyprland source
        if: steps.hypr-src-cache.outputs.cache-hit != 'true'
        run: |
          apt-get source ${{ env.HYPR_SRC }}=${{ inputs.hyprland_version }}

      - name: Find Hyprland source dir
        id: hypr-src-dir
        run: |
          SRCDIR=$(find . -maxdepth 1 -type d -name "${{ env.HYPR_SRC }}-*" | head -1)
          echo "srcdir=${SRCDIR}" >> $GITHUB_OUTPUT

      # ---------- 16. 应用 Hyprland 补丁 ----------
      - name: Apply Anland patch to Hyprland
        if: steps.hypr-src-cache.outputs.cache-hit != 'true'
        run: |
          cd ${{ steps.hypr-src-dir.outputs.srcdir }}
          PATCH_FILE="${{ github.workspace }}/repo/patches/${{ env.HYPR_PATCH }}"
          if [ -f "$PATCH_FILE" ]; then
            patch -p1 --forward --reject-file=- < "$PATCH_FILE" || true
          fi

      # ---------- 17. 修改 Hyprland changelog ----------
      - name: Bump Hyprland changelog
        if: steps.hypr-src-cache.outputs.cache-hit != 'true'
        run: |
          cd ${{ steps.hypr-src-dir.outputs.srcdir }}
          VER=$(dpkg-parsechangelog --show-field Version)
          NEW_VER="${VER}+anland1"
          dch --newversion "$NEW_VER" "Add Anland backend support (CI build)"
          echo "Hypr version: $NEW_VER"

      # ---------- 18. 安装 Hyprland build-dep ----------
      - name: Install Hyprland build dependencies
        run: |
          cd ${{ steps.hypr-src-dir.outputs.srcdir }}
          apt-get build-dep -y ./ || apt-get build-dep -y ${{ env.HYPR_SRC }}

      # ---------- 19. 构建 Hyprland .deb ----------
      - name: Build Hyprland .deb
        run: |
          cd ${{ steps.hypr-src-dir.outputs.srcdir }}
          dpkg-buildpackage -b -uc -us -d -j$(nproc)

      # ---------- 20. 收集 Hyprland .deb ----------
      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find . -maxdepth 1 -name "hyprland*.deb" -exec cp {} artifacts/ \;
          ls -la artifacts/

      # ---------- 21. 上传 Hyprland .deb ----------
      - name: Upload Hyprland debs
        uses: actions/upload-artifact@v4
        with:
          name: hyprland-anland-debs
          path: artifacts/*.deb
          retention-days: 7