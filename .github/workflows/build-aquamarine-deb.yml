name: Build Aquamarine (Anland) from Debian source

on:
  workflow_dispatch:
    inputs:
      aquamarine_version:
        description: 'Aquamarine Debian version (e.g. 0.11.0-2~bpo13+1)'
        required: true
        default: '0.11.0-2~bpo13+1'
      clean_cache:
        description: 'Clean all caches and rebuild from scratch'
        required: false
        default: 'false'
        type: boolean

env:
  DEBIAN_FRONTEND: noninteractive
  SOURCE_PKG: aquamarine

jobs:
  build-aquamarine:
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:trixie-slim
      options: --privileged --user root

    steps:
      # ---------- 1. 设置 Debian 源（包含 backports 和 deb-src） ----------
      - name: Setup sources
        run: |
          cat > /etc/apt/sources.list << 'EOF'
          deb http://deb.debian.org/debian trixie main
          deb http://deb.debian.org/debian trixie-updates main
          deb http://deb.debian.org/debian-security trixie-security main
          deb http://deb.debian.org/debian trixie-backports main
          deb-src http://deb.debian.org/debian trixie main
          deb-src http://deb.debian.org/debian trixie-updates main
          deb-src http://deb.debian.org/debian-security trixie-security main
          deb-src http://deb.debian.org/debian trixie-backports main
          EOF
          apt-get update

      # ---------- 2. 生成 APT 包列表哈希 ----------
      - name: Generate APT package list hash
        id: apt-hash
        run: |
          cat > /tmp/apt-packages.txt << 'EOF'
          devscripts build-essential fakeroot dpkg-dev quilt debhelper-compat
          cmake pkg-config git wget curl ca-certificates gnupg
          EOF
          PACKAGE_HASH=$(sha256sum /tmp/apt-packages.txt | cut -c1-16)
          echo "package_hash=${PACKAGE_HASH}" >> $GITHUB_OUTPUT

      # ---------- 3. APT 缓存 ----------
      - name: Cache APT packages
        id: apt-cache
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives/*.deb
            /var/lib/apt/lists
          key: apt-aqua-${{ runner.arch }}-${{ steps.apt-hash.outputs.package_hash }}
          restore-keys: |
            apt-aqua-${{ runner.arch }}-

      # ---------- 4. 安装基础构建工具 ----------
      - name: Install base tools and devscripts
        run: |
          apt-get install -y --no-install-recommends \
            devscripts build-essential fakeroot dpkg-dev quilt \
            cmake pkg-config git wget curl ca-certificates gnupg

      # ---------- 5. 源码缓存 ----------
      - name: Cache Aquamarine source tree
        id: src-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.SOURCE_PKG }}-*
          key: src-aqua-${{ inputs.aquamarine_version }}
          restore-keys: |
            src-aqua-${{ inputs.aquamarine_version }}-
            src-aqua-

      # ---------- 6. 获取源码（如果缓存未命中） ----------
      - name: Fetch Aquamarine source
        if: steps.src-cache.outputs.cache-hit != 'true'
        run: |
          apt-get source ${{ env.SOURCE_PKG }}=${{ inputs.aquamarine_version }}

      - name: Find source directory
        id: find-src
        run: |
          SRCDIR=$(find . -maxdepth 1 -type d -name "${{ env.SOURCE_PKG }}-*" | head -1)
          echo "srcdir=${SRCDIR}" >> $GITHUB_OUTPUT

      # ---------- 7. 修改 changelog 添加本地版本后缀 ----------
      - name: Bump changelog (add +anland1)
        if: steps.src-cache.outputs.cache-hit != 'true'
        run: |
          cd ${{ steps.find-src.outputs.srcdir }}
          VER=$(dpkg-parsechangelog --show-field Version)
          NEW_VER="${VER}+anland1"
          dch --newversion "$NEW_VER" "CI build with Anland backend"
          echo "New version: $NEW_VER"

      # ---------- 8. 安装构建依赖 ----------
      - name: Install build dependencies
        run: |
          cd ${{ steps.find-src.outputs.srcdir }}
          apt-get build-dep -y ./ || apt-get build-dep -y ${{ env.SOURCE_PKG }}

      # ---------- 9. 构建 .deb ----------
      - name: Build Aquamarine .deb
        run: |
          cd ${{ steps.find-src.outputs.srcdir }}
          dpkg-buildpackage -b -uc -us -d -j$(nproc)

      # ---------- 10. 收集 .deb 文件 ----------
      - name: Collect .deb files
        run: |
          mkdir -p artifacts
          find . -maxdepth 1 -name "*.deb" -exec cp {} artifacts/ \;
          ls -la artifacts/

      # ---------- 11. 上传 artifact ----------
      - name: Upload Aquamarine debs
        uses: actions/upload-artifact@v4
        with:
          name: aquamarine-anland-debs
          path: artifacts/*.deb
          retention-days: 7