name: 🏗️ Build Anland (Aquamarine & Hyprland)

on:
  workflow_dispatch:
    inputs:
      # ----- 源码版本/分支 -----
      aquamarine_branch:
        description: 'Aquamarine branch (GitHub)'
        required: true
        default: 'main'
        type: string
      hyprland_version:
        description: 'Hyprland Debian version (e.g. 0.55.2+ds-1~bpo13+1)'
        required: true
        default: '0.55.2+ds-1~bpo13+1'

      # ----- 构建开关 -----
      skip_aquamarine:
        description: 'Skip Aquamarine build (use pre-installed)'
        required: false
        default: false
        type: boolean
      skip_hyprland:
        description: 'Skip Hyprland build (only build Aquamarine)'
        required: false
        default: false
        type: boolean

      # ----- 缓存控制 -----
      clean_cache:
        description: 'Clean all caches and rebuild from scratch'
        required: false
        default: false
        type: boolean

env:
  DEBIAN_FRONTEND: noninteractive
  HYPR_SRC: hyprland
  HYPR_PATCH: hyprland-anland.patch

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:trixie-slim
      options: --privileged --user root

    steps:
      # ==========================================================
      # 1. 设置 Debian 源（包含 sid）
      # ==========================================================
      - name: Setup sources
        run: |
          cat > /etc/apt/sources.list << 'EOF'
          deb http://deb.debian.org/debian trixie main
          deb http://deb.debian.org/debian trixie-updates main
          deb http://deb.debian.org/debian-security trixie-security main
          deb http://deb.debian.org/debian trixie-backports main
          deb http://deb.debian.org/debian sid main
          deb-src http://deb.debian.org/debian trixie main
          deb-src http://deb.debian.org/debian trixie-updates main
          deb-src http://deb.debian.org/debian-security trixie-security main
          deb-src http://deb.debian.org/debian trixie-backports main
          deb-src http://deb.debian.org/debian sid main
          EOF
          rm -f /etc/apt/sources.list.d/debian.sources 2>/dev/null || true
          # 设置 APT 默认使用 trixie，但可以从 sid 安装特定包
          cat > /etc/apt/apt.conf.d/99backports << 'EOF'
          APT::Default-Release "trixie";
          EOF
          apt-get update

      # ==========================================================
      # 2. 生成 APT 哈希
      # ==========================================================
      - name: Generate APT package list hash
        id: apt-hash
        shell: bash
        run: |
          cat > /tmp/apt-packages.txt << 'EOF'
          # 基础构建工具
          devscripts build-essential fakeroot dpkg-dev quilt debhelper-compat
          cmake pkg-config git wget curl ca-certificates gnupg xxd
          # OpenGL/EGL/GLES
          libgles-dev libegl-dev libgl-dev libgl1-mesa-dev libegl1-mesa-dev
          libgles2-mesa-dev mesa-common-dev
          # Wayland 核心
          libwayland-dev wayland-protocols
          # 输入/显示
          libseat-dev libinput-dev libudev-dev
          # DRM/GBM
          libdrm-dev libgbm-dev
          # X11 相关
          libxkbcommon-dev
          libxcb1-dev libxcb-render0-dev libxcb-xfixes0-dev
          libxcb-icccm4-dev libxcb-composite0-dev libxcb-res0-dev
          libxcb-errors-dev libxrender-dev libxcomposite-dev
          libxfixes-dev libxext-dev libxcursor-dev
          # 图形/渲染
          libpixman-1-dev libcairo2-dev libpango1.0-dev libpangocairo-1.0-0
          # Hyprland 生态库（backports 中可用）
          libhyprutils-dev libhyprlang-dev libhyprcursor-dev libhyprgraphics-dev
          # 其他
          libpugixml-dev libtomlplusplus-dev
          uuid-dev libsystemd-dev
          libre2-dev libmuparser-dev liblcms2-dev
          liblua5.4-dev
          hwdata
          # PipeWire
          libpipewire-0.3-dev libspa-0.2-dev
          EOF
          PACKAGE_HASH=$(sha256sum /tmp/apt-packages.txt | cut -c1-16)
          echo "package_hash=${PACKAGE_HASH}" >> $GITHUB_OUTPUT

      # ==========================================================
      # 3. APT 缓存
      # ==========================================================
      - name: Cache APT packages
        id: apt-cache
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives/*.deb
            /var/lib/apt/lists
          key: apt-all-${{ runner.arch }}-${{ steps.apt-hash.outputs.package_hash }}
          restore-keys: |
            apt-all-${{ runner.arch }}-

      # ==========================================================
      # 4. 安装所有依赖（不包含 libdisplay-info，后面单独从 sid 安装）
      # ==========================================================
      - name: Install all dependencies
        run: |
          apt-get install -y --no-install-recommends \
            devscripts build-essential fakeroot dpkg-dev quilt \
            cmake pkg-config git wget curl ca-certificates gnupg xxd \
            libgles-dev libegl-dev libgl-dev libgl1-mesa-dev \
            libegl1-mesa-dev libgles2-mesa-dev mesa-common-dev \
            libwayland-dev wayland-protocols \
            libseat-dev libinput-dev libudev-dev \
            libdrm-dev libgbm-dev \
            libxkbcommon-dev \
            libxcb1-dev libxcb-render0-dev libxcb-xfixes0-dev \
            libxcb-icccm4-dev libxcb-composite0-dev libxcb-res0-dev \
            libxcb-errors-dev libxrender-dev libxcomposite-dev \
            libxfixes-dev libxext-dev libxcursor-dev \
            libpixman-1-dev libcairo2-dev libpango1.0-dev libpangocairo-1.0-0 \
            libpugixml-dev libtomlplusplus-dev \
            uuid-dev libsystemd-dev \
            libre2-dev libmuparser-dev liblcms2-dev \
            liblua5.4-dev \
            hwdata

      # ==========================================================
      # 5. 从 backports 安装 Hyprland 生态库
      # ==========================================================
      - name: Install backports dependencies
        run: |
          apt-get install -y -t trixie-backports --no-install-recommends \
            libxkbcommon-dev wayland-protocols \
            libinput-dev \
            libhyprutils-dev libhyprlang-dev \
            libhyprcursor-dev libhyprgraphics-dev \
            libpipewire-0.3-dev libspa-0.2-dev \
            || echo "Some backports packages may already be installed"
          
          # 诊断：找到 hyprutils.pc 的实际位置
          echo "=== Finding hyprutils.pc ==="
          find /usr -name "hyprutils.pc" 2>/dev/null || echo "hyprutils.pc not found"
          echo "=== Finding libdisplay-info.pc ==="
          find /usr -name "libdisplay-info.pc" 2>/dev/null || echo "libdisplay-info.pc not found"

      # ==========================================================
      # 6. 从 sid 安装 libdisplay-info（trixie 版本太旧）
      # ==========================================================
      - name: Install libdisplay-info from sid
        run: |
          # libdisplay-info 在 trixie 中版本太旧 (0.2.0)，需要 >= 0.3.0
          apt-get install -y -t sid --no-install-recommends \
            libdisplay-info-dev libdisplay-info3 \
            || echo "Failed to install libdisplay-info from sid"
          
          # 验证安装
          echo "=== libdisplay-info version ==="
          pkg-config --modversion libdisplay-info 2>/dev/null || echo "libdisplay-info not found by pkg-config"
          ls -la /usr/lib/aarch64-linux-gnu/pkgconfig/libdisplay-info* 2>/dev/null || echo "No pc file"

      # ==========================================================
      # 7. 构建 hyprwayland-scanner（Aquamarine 依赖）
      # ==========================================================
      - name: Cache hyprwayland-scanner
        id: scanner-cache
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/hyprwayland-scanner
          key: scanner-${{ runner.arch }}

      - name: Build hyprwayland-scanner
        if: steps.scanner-cache.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          rm -rf hyprwayland-scanner
          git clone --depth 1 https://github.com/hyprwm/hyprwayland-scanner.git
          cd hyprwayland-scanner
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local
          make -j$(nproc)
          make install

      - name: Verify hyprwayland-scanner
        run: |
          export PATH=/usr/local/bin:$PATH
          echo "PATH=/usr/local/bin:$PATH" >> $GITHUB_ENV

      # ==========================================================
      # 8. 检出仓库（获取补丁）
      # ==========================================================
      - name: Checkout repository (for hyprland patch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ==========================================================
      # 9. 验证补丁文件
      # ==========================================================
      - name: Verify patch file
        id: patch-hash
        shell: bash
        run: |
          if [ -f "./${{ env.HYPR_PATCH }}" ]; then
            echo "✅ Patch file found: ./${{ env.HYPR_PATCH }}"
            HASH=$(sha256sum "./${{ env.HYPR_PATCH }}" | cut -c1-16)
            echo "hypr_patch_hash=${HASH}" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Patch file not found: ./${{ env.HYPR_PATCH }}"
            echo "hypr_patch_hash=no-patch" >> $GITHUB_OUTPUT
          fi

      # ==========================================================
      # 10. 清理缓存（如果请求）
      # ==========================================================
      - name: Clean caches if requested
        if: inputs.clean_cache == true
        run: |
          echo "🧹 Cleaning caches as requested..."
          rm -rf /tmp/aqua-install /tmp/hypr-install
          rm -rf aquamarine*/ hyprland*/
          apt-get clean
          rm -rf /var/lib/apt/lists/*
          apt-get update
          echo "✅ Cache cleaned"

      # ==========================================================
      # 第一部分：构建 Aquamarine（可选）
      # ==========================================================
      - name: ═══ Build Aquamarine (Anland) ═══
        if: inputs.skip_aquamarine != true
        run: echo "Starting Aquamarine build..."

      # ---------- 11. 克隆 Aquamarine ----------
      - name: Clone Aquamarine (Anland) from GitHub
        if: inputs.skip_aquamarine != true
        uses: actions/checkout@v4
        with:
          repository: sjszero/aquamarine
          ref: ${{ inputs.aquamarine_branch }}
          path: aquamarine
          fetch-depth: 1

      # ---------- 12. 获取 Aquamarine commit ----------
      - name: Get Aquamarine commit
        id: aqua-commit
        if: inputs.skip_aquamarine != true
        shell: bash
        run: |
          cd aquamarine
          COMMIT=$(git rev-parse HEAD)
          echo "commit=${COMMIT}" >> $GITHUB_OUTPUT

      # ---------- 13. Aquamarine 构建缓存 ----------
      - name: Cache Aquamarine build
        id: aqua-build-cache
        if: inputs.skip_aquamarine != true
        uses: actions/cache@v4
        with:
          path: |
            aquamarine/build
            /tmp/aqua-install
          key: aqua-build-${{ steps.aqua-commit.outputs.commit }}
          restore-keys: |
            aqua-build-${{ steps.aqua-commit.outputs.commit }}-
            aqua-build-

      # ---------- 14. 构建 Aquamarine（关键：动态设置 PKG_CONFIG_PATH）----------
      - name: Build Aquamarine (Anland)
        if: inputs.skip_aquamarine != true && steps.aqua-build-cache.outputs.cache-hit != 'true'
        run: |
          cd aquamarine
          mkdir -p build && cd build
          
          # 动态查找 .pc 文件路径
          PC_PATHS=$(find /usr -name "*.pc" -exec dirname {} \; 2>/dev/null | sort -u | tr '\n' ':')
          export PKG_CONFIG_PATH="${PC_PATHS}:/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/local/lib/pkgconfig:/usr/share/pkgconfig"
          
          echo "=== PKG_CONFIG_PATH ==="
          echo "$PKG_CONFIG_PATH"
          echo ""
          echo "=== Testing pkg-config ==="
          pkg-config --modversion hyprutils 2>/dev/null || echo "hyprutils not found"
          pkg-config --modversion libdisplay-info 2>/dev/null || echo "libdisplay-info not found"
          echo ""
          echo "=== cmake command ==="
          cmake .. -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCMAKE_INSTALL_LIBDIR=/usr/lib/aarch64-linux-gnu \
            -DCMAKE_LIBRARY_PATH="/usr/lib/aarch64-linux-gnu:/usr/lib:/usr/local/lib" \
            -DCMAKE_INCLUDE_PATH="/usr/include:/usr/local/include" \
            -DCMAKE_PREFIX_PATH="/usr/local:/usr" \
            -DENABLE_ANLAND=ON \
            -DANLAND_SOCKET="/run/display.sock"
          make -j$(nproc)
          make install DESTDIR=/tmp/aqua-install

      # ---------- 15. 打包 Aquamarine .deb ----------
      - name: Package Aquamarine .deb
        if: inputs.skip_aquamarine != true && steps.aqua-build-cache.outputs.cache-hit != 'true'
        run: |
          cd /tmp/aqua-install
          mkdir -p DEBIAN
          cat > DEBIAN/control << 'EOF'
          Package: libaquamarine10
          Version: 0.11.0-anland1
          Architecture: arm64
          Maintainer: sjszero <sjszero@github.com>
          Description: Aquamarine with Anland backend
          Depends: libc6 (>= 2.38), libdisplay-info3 (>= 0.3.0),
           libdrm2 (>= 2.4.119), libegl1, libgbm1 (>= 21.3.0~rc1),
           libgcc-s1 (>= 4.5), libhyprutils12 (>= 0.13.1),
           libinput10 (>= 1.26.0), libopengl0, libseat1 (>= 0.8.0),
           libstdc++6 (>= 13.1), libudev1 (>= 183),
           libwayland-client0 (>= 1.20.0)
          Section: libs
          Priority: optional
          EOF
          cat > DEBIAN/postinst << 'EOF'
          #!/bin/sh
          set -e
          ldconfig
          EOF
          chmod 755 DEBIAN/postinst
          find usr -type f -exec chmod 644 {} \;
          find usr/lib -name '*.so*' -exec chmod 755 {} \; 2>/dev/null || true
          cd /
          dpkg-deb --build /tmp/aqua-install /libaquamarine10_0.11.0-anland1_arm64.deb

      # ---------- 16. 安装 Aquamarine .deb ----------
      - name: Install Aquamarine .deb
        if: inputs.skip_aquamarine != true
        run: |
          # 先确保运行时依赖已安装（从 sid）
          apt-get install -y -t sid --no-install-recommends libdisplay-info3 || \
            apt-get install -y --no-install-recommends libdisplay-info3 || true
          if [ -f /libaquamarine10_*.deb ]; then
            dpkg -i /libaquamarine10_*.deb || apt-get install -f -y
            dpkg -i /libaquamarine10_*.deb
          else
            echo "⚠️ Aquamarine .deb not found, attempting to install from cache..."
            if [ -d /tmp/aqua-install ]; then
              cd /tmp/aqua-install
              find usr -type f -exec chmod 644 {} \;
              find usr/lib -name '*.so*' -exec chmod 755 {} \; 2>/dev/null || true
              cd /
              dpkg-deb --build /tmp/aqua-install /libaquamarine10_0.11.0-anland1_arm64.deb
              dpkg -i /libaquamarine10_*.deb || apt-get install -f -y
              dpkg -i /libaquamarine10_*.deb
            else
              echo "❌ No Aquamarine build found. Please build or provide pre-built package."
              exit 1
            fi
          fi

      # ==========================================================
      # 第二部分：构建 Hyprland（可选）
      # ==========================================================
      - name: ═══ Build Hyprland (Anland) ═══
        if: inputs.skip_hyprland != true
        run: echo "Starting Hyprland build..."

      # ---------- 17. Hyprland 源码缓存 ----------
      - name: Cache Hyprland source
        id: hypr-src-cache
        if: inputs.skip_hyprland != true
        uses: actions/cache@v4
        with:
          path: ${{ env.HYPR_SRC }}-*
          key: src-hypr-${{ inputs.hyprland_version }}-${{ steps.patch-hash.outputs.hypr_patch_hash }}
          restore-keys: |
            src-hypr-${{ inputs.hyprland_version }}-
            src-hypr-

      # ---------- 18. 获取 Hyprland Debian 源码 ----------
      - name: Fetch Hyprland source
        if: inputs.skip_hyprland != true && steps.hypr-src-cache.outputs.cache-hit != 'true'
        run: |
          apt-get source ${{ env.HYPR_SRC }}=${{ inputs.hyprland_version }}

      # ---------- 19. 应用 Hyprland Anland 补丁 ----------
      - name: Apply Anland patch to Hyprland
        if: inputs.skip_hyprland != true && steps.hypr-src-cache.outputs.cache-hit != 'true'
        run: |
          cd ./${{ env.HYPR_SRC }}-*/
          PATCH_FILE="../${{ env.HYPR_PATCH }}"
          if [ -f "$PATCH_FILE" ]; then
            echo "Applying ${{ env.HYPR_PATCH }} from $PATCH_FILE..."
            patch -p1 --forward --reject-file=- < "$PATCH_FILE" || {
              echo "Patch may already be applied, continuing..."
            }
          else
            echo "⚠️ No patch file found at $PATCH_FILE, skipping"
          fi

      # ---------- 20. 修改 Hyprland changelog ----------
      - name: Bump Hyprland changelog
        if: inputs.skip_hyprland != true && steps.hypr-src-cache.outputs.cache-hit != 'true'
        run: |
          cd ./${{ env.HYPR_SRC }}-*/
          if ! grep -q "+anland1" debian/changelog; then
            VER=$(dpkg-parsechangelog --show-field Version)
            NEW_VER="${VER}+anland1"
            dch --newversion "$NEW_VER" "Add Anland backend support (CI build)"
            echo "Hypr version: $NEW_VER"
          else
            echo "Hypr changelog already has +anland1 suffix, skipping"
          fi

      # ---------- 21. 安装 Hyprland build-dep ----------
      - name: Install Hyprland build dependencies
        if: inputs.skip_hyprland != true
        run: |
          cd ./${{ env.HYPR_SRC }}-*/
          apt-get build-dep -y ./ || {
            echo "build-dep failed, trying with backports..."
            apt-get install -y -t trixie-backports --no-install-recommends \
              libxkbcommon-dev wayland-protocols \
              libinput-dev \
              libhyprutils-dev libhyprlang-dev \
              libhyprcursor-dev libhyprgraphics-dev \
              libpipewire-0.3-dev libspa-0.2-dev \
              || echo "Some packages may already be installed"
            apt-get build-dep -y ./
          }

      # ---------- 22. 构建 Hyprland .deb ----------
      - name: Build Hyprland .deb
        if: inputs.skip_hyprland != true
        run: |
          cd ./${{ env.HYPR_SRC }}-*/
          dpkg-buildpackage -b -uc -us -d -j$(nproc)

      # ==========================================================
      # 23. 收集 artifacts
      # ==========================================================
      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts

          # 复制 Aquamarine .deb
          if [ -f /libaquamarine10_*.deb ]; then
            cp /libaquamarine10_*.deb artifacts/
            echo "✅ Copied Aquamarine .deb"
          else
            echo "⚠️ No Aquamarine .deb found"
          fi

          # 过滤 Hyprland 相关的 .deb（如果构建了）
          if [ "${{ inputs.skip_hyprland }}" != "true" ]; then
            find . -maxdepth 1 -name "*.deb" -type f | while read -r deb; do
              filename=$(basename "$deb")
              if echo "$filename" | grep -q "^hyprland_[0-9].*\.deb$" && ! echo "$filename" | grep -q "dbgsym\|dev"; then
                cp "$deb" artifacts/
                echo "✅ Kept: $filename"
              elif echo "$filename" | grep -q "^hyprland-backgrounds_.*\.deb$" && ! echo "$filename" | grep -q "dbgsym"; then
                cp "$deb" artifacts/
                echo "✅ Kept: $filename"
              else
                echo "⏭️ Skipped: $filename"
              fi
            done
          fi

          echo ""
          echo "=== Final artifacts ==="
          ls -la artifacts/

      # ==========================================================
      # 24. 上传 artifacts
      # ==========================================================
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anland-debs
          path: artifacts/*.deb
          retention-days: 7

      # ==========================================================
      # 25. 构建摘要
      # ==========================================================
      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| APT Cache | ${{ steps.apt-cache.outputs.cache-hit }} |" >> $GITHUB_STEP_SUMMARY
          echo "| hyprwayland-scanner | ${{ steps.scanner-cache.outputs.cache-hit }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Aquamarine Build | ${{ steps.aqua-build-cache.outputs.cache-hit }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Hyprland Source | ${{ steps.hypr-src-cache.outputs.cache-hit }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Artifacts" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -la artifacts/ >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No artifacts found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Install" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "sudo dpkg -i libaquamarine10_*.deb hyprland_*.deb hyprland-backgrounds_*.deb" >> $GITHUB_STEP_SUMMARY
          echo "sudo apt-get install -f -y" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY