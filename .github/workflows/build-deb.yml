name: 🏗️ Build Anland (Aquamarine & Hyprland)

on:
  workflow_dispatch:
    inputs:
      aquamarine_branch:
        description: 'Aquamarine branch (GitHub)'
        required: true
        default: 'main'
        type: string
      hyprland_version:
        description: 'Hyprland Debian version (e.g. 0.55.2+ds-1~bpo13+1)'
        required: true
        default: '0.55.2+ds-1~bpo13+1'
      skip_aquamarine:
        description: 'Skip Aquamarine build (use pre-installed)'
        required: false
        default: false
        type: boolean
      skip_hyprland:
        description: 'Skip Hyprland build (only build Aquamarine)'
        required: false
        default: false
        type: boolean
      clean_cache:
        description: 'Clean all caches and rebuild from scratch'
        required: false
        default: false
        type: boolean

env:
  DEBIAN_FRONTEND: noninteractive
  HYPR_SRC: hyprland
  HYPR_PATCH: hyprland-anland.patch
  AQUAMARINE_VERSION: 0.11.0

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:trixie-slim
      options: --privileged --user root

    steps:
      # ==========================================================
      # 1. 基础环境设置
      # ==========================================================
      - name: Setup APT sources
        run: |
          cat > /etc/apt/sources.list << 'EOF'
          deb http://deb.debian.org/debian trixie main
          deb http://deb.debian.org/debian trixie-updates main
          deb http://deb.debian.org/debian-security trixie-security main
          deb http://deb.debian.org/debian trixie-backports main
          deb http://deb.debian.org/debian sid main
          deb-src http://deb.debian.org/debian trixie main
          deb-src http://deb.debian.org/debian trixie-updates main
          deb-src http://deb.debian.org/debian-security trixie-security main
          deb-src http://deb.debian.org/debian trixie-backports main
          deb-src http://deb.debian.org/debian sid main
          EOF
          rm -f /etc/apt/sources.list.d/debian.sources 2>/dev/null || true
          cat > /etc/apt/apt.conf.d/99backports << 'EOF'
          APT::Default-Release "trixie";
          APT::Install-Recommends "false";
          APT::Install-Suggests "false";
          EOF
          apt-get update

      - name: Generate APT package list hash
        id: apt-hash
        run: |
          cat > /tmp/apt-packages.txt << 'EOF'
          # Build essentials
          devscripts build-essential fakeroot dpkg-dev quilt debhelper-compat
          cmake pkg-config git wget curl ca-certificates gnupg xxd

          # OpenGL/EGL
          libgles-dev libegl-dev libgl-dev libgl1-mesa-dev
          libegl1-mesa-dev libgles2-mesa-dev mesa-common-dev

          # Wayland
          libwayland-dev wayland-protocols

          # Input/Seat
          libseat-dev libinput-dev libudev-dev

          # DRM/GBM
          libdrm-dev libgbm-dev

          # X11/XCB (for XWayland)
          libxkbcommon-dev
          libxcb1-dev libxcb-render0-dev libxcb-xfixes0-dev
          libxcb-icccm4-dev libxcb-composite0-dev libxcb-res0-dev
          libxcb-errors-dev libxrender-dev libxcomposite-dev
          libxfixes-dev libxext-dev libxcursor-dev

          # Graphics
          libpixman-1-dev libcairo2-dev libpango1.0-dev libpangocairo-1.0-0

          # Hypr ecosystem
          libhyprutils-dev libhyprlang-dev libhyprcursor-dev libhyprgraphics-dev libhyprwire-dev

          # Utilities
          libpugixml-dev libtomlplusplus-dev
          uuid-dev libsystemd-dev
          libre2-dev libmuparser-dev liblcms2-dev
          liblua5.4-dev
          hwdata

          # Shader compilation
          glslang-dev glslang-tools

          # OpenSSL (for Hyprland's libcrypto dependency)
          libssl-dev

          # libdisplay-info from sid
          libdisplay-info-dev libdisplay-info3
          EOF
          echo "package_hash=$(sha256sum /tmp/apt-packages.txt | cut -c1-16)" >> $GITHUB_OUTPUT

      - name: Cache APT packages
        id: apt-cache
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives/*.deb
            /var/lib/apt/lists
          key: apt-${{ runner.arch }}-${{ steps.apt-hash.outputs.package_hash }}
          restore-keys: apt-${{ runner.arch }}-

      - name: Install base dependencies
        run: |
          apt-get install -y --no-install-recommends \
            devscripts build-essential fakeroot dpkg-dev quilt debhelper-compat \
            cmake pkg-config git wget curl ca-certificates gnupg xxd \
            libgles-dev libegl-dev libgl-dev libgl1-mesa-dev \
            libegl1-mesa-dev libgles2-mesa-dev mesa-common-dev \
            libwayland-dev wayland-protocols \
            libseat-dev libinput-dev libudev-dev \
            libdrm-dev libgbm-dev \
            libxkbcommon-dev \
            libxcb1-dev libxcb-render0-dev libxcb-xfixes0-dev \
            libxcb-icccm4-dev libxcb-composite0-dev libxcb-res0-dev \
            libxcb-errors-dev libxrender-dev libxcomposite-dev \
            libxfixes-dev libxext-dev libxcursor-dev \
            libpixman-1-dev libcairo2-dev libpango1.0-dev libpangocairo-1.0-0 \
            libpugixml-dev libtomlplusplus-dev \
            uuid-dev libsystemd-dev \
            libre2-dev libmuparser-dev liblcms2-dev \
            liblua5.4-dev \
            hwdata \
            glslang-dev glslang-tools \
            libssl-dev \
            libhyprwire-dev

      - name: Install backports and sid dependencies
        run: |
          apt-get install -y -t sid --no-install-recommends \
            libdisplay-info-dev libdisplay-info3 \
            || apt-get install -y -t trixie-backports --no-install-recommends \
            libdisplay-info-dev libdisplay-info3 \
            || echo "⚠️ libdisplay-info not available"

          apt-get install -y -t trixie-backports --no-install-recommends \
            libxkbcommon-dev wayland-protocols \
            libinput-dev \
            libhyprutils-dev libhyprlang-dev \
            libhyprcursor-dev libhyprgraphics-dev libhyprwire-dev \
            libpipewire-0.3-dev libspa-0.2-dev \
            || echo "⚠️ Some backports packages not available"

      - name: Verify libdisplay-info
        run: |
          if pkg-config --exists libdisplay-info; then
            echo "✅ libdisplay-info found:"
            pkg-config --modversion libdisplay-info
          else
            echo "⚠️ libdisplay-info not found, installing from source..."
            cd /tmp
            git clone --depth 1 https://gitlab.freedesktop.org/emersion/libdisplay-info.git
            cd libdisplay-info
            meson setup build -Dprefix=/usr
            ninja -C build
            ninja -C build install
            ldconfig
            echo "✅ libdisplay-info installed from source"
          fi

      # ==========================================================
      # 2. Build hyprwayland-scanner
      # ==========================================================
      - name: Cache hyprwayland-scanner
        id: scanner-cache
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/hyprwayland-scanner
            /usr/local/lib/cmake/hyprwayland-scanner
          key: scanner-${{ runner.arch }}-2024

      - name: Build hyprwayland-scanner
        if: steps.scanner-cache.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          rm -rf hyprwayland-scanner
          git clone --depth 1 https://github.com/hyprwm/hyprwayland-scanner.git
          cd hyprwayland-scanner
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DCMAKE_INSTALL_LIBDIR=lib
          make -j$(nproc)
          make install

      - name: Setup PATH
        run: |
          export PATH=/usr/local/bin:$PATH
          echo "PATH=/usr/local/bin:$PATH" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/local/lib/pkgconfig:/usr/share/pkgconfig" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=/usr/local:/usr" >> $GITHUB_ENV

      # ==========================================================
      # 3. Checkout repository (for patch)
      # ==========================================================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Verify patch file
        id: patch-info
        run: |
          if [ -f "./${{ env.HYPR_PATCH }}" ]; then
            echo "✅ Patch file found: ./${{ env.HYPR_PATCH }}"
            echo "patch_exists=true" >> $GITHUB_OUTPUT
            echo "patch_hash=$(sha256sum "./${{ env.HYPR_PATCH }}" | cut -c1-16)" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Patch file not found: ./${{ env.HYPR_PATCH }}"
            echo "patch_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Clean caches if requested
        if: inputs.clean_cache == true
        run: |
          echo "🧹 Cleaning caches..."
          rm -rf /tmp/aqua-install /tmp/hypr-install
          rm -rf aquamarine*/ hyprland*/
          dpkg -r libaquamarine11 2>/dev/null || true
          dpkg -r libaquamarine-dev 2>/dev/null || true
          apt-get clean
          rm -rf /var/lib/apt/lists/*
          apt-get update

      # ==========================================================
      # 4. Build Aquamarine (Anland)
      # ==========================================================
      - name: ═══ Build Aquamarine (Anland) ═══
        if: inputs.skip_aquamarine != true
        run: echo "Starting Aquamarine build..."

      - name: Clone Aquamarine
        if: inputs.skip_aquamarine != true
        uses: actions/checkout@v4
        with:
          repository: sjszero/aquamarine
          ref: ${{ inputs.aquamarine_branch }}
          path: aquamarine
          fetch-depth: 1

      - name: Get Aquamarine commit
        id: aqua-commit
        if: inputs.skip_aquamarine != true
        run: |
          cd aquamarine
          echo "commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Cache Aquamarine build
        id: aqua-cache
        if: inputs.skip_aquamarine != true
        uses: actions/cache@v4
        with:
          path: |
            aquamarine/build
            /tmp/aqua-install
          key: aqua-${{ runner.arch }}-${{ steps.aqua-commit.outputs.commit }}
          restore-keys: |
            aqua-${{ runner.arch }}-

      - name: Build Aquamarine
        if: inputs.skip_aquamarine != true && steps.aqua-cache.outputs.cache-hit != 'true'
        run: |
          cd aquamarine
          mkdir -p build && cd build

          export PKG_CONFIG_PATH="/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/local/lib/pkgconfig:/usr/share/pkgconfig:${PKG_CONFIG_PATH}"

          echo "=== pkg-config check ==="
          pkg-config --modversion libdisplay-info 2>/dev/null || echo "libdisplay-info not found"

          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCMAKE_INSTALL_LIBDIR=/usr/lib/aarch64-linux-gnu \
            -DCMAKE_LIBRARY_PATH="/usr/lib/aarch64-linux-gnu:/usr/lib:/usr/local/lib" \
            -DCMAKE_INCLUDE_PATH="/usr/include:/usr/local/include" \
            -DPIPEWIRE_FOUND=ON \
            -DENABLE_ANLAND=ON

          make -j$(nproc)
          make install
          make install DESTDIR=/tmp/aqua-install

          echo "=== Verifying Anland headers ==="
          if [ -d /usr/include/aquamarine/backend/anland ]; then
            echo "✅ Anland headers installed"
            ls -la /usr/include/aquamarine/backend/anland/
          else
            echo "❌ Anland headers NOT installed!"
            exit 1
          fi

      - name: Package Aquamarine .deb
        if: inputs.skip_aquamarine != true && steps.aqua-cache.outputs.cache-hit != 'true'
        run: |
          cd /tmp/aqua-install

          mkdir -p DEBIAN
          cat > DEBIAN/control << 'EOF'
          Package: libaquamarine11
          Version: ${{ env.AQUAMARINE_VERSION }}-anland1
          Architecture: arm64
          Maintainer: sjszero <sjszero@github.com>
          Description: Aquamarine with Anland backend
           Aquamarine is a rendering backend library with native Anland
           (Android display) support.
          Depends: libc6 (>= 2.38), libdisplay-info3 (>= 0.3.0),
           libdrm2 (>= 2.4.119), libegl1, libgbm1 (>= 21.3.0~rc1),
           libgcc-s1 (>= 4.5), libhyprutils12 (>= 0.13.1),
           libinput10 (>= 1.26.0), libopengl0, libseat1 (>= 0.8.0),
           libstdc++6 (>= 13.1), libudev1 (>= 183),
           libwayland-client0 (>= 1.20.0)
          Section: libs
          Priority: optional
          EOF

          cat > DEBIAN/postinst << 'EOF'
          #!/bin/sh
          set -e
          ldconfig
          EOF
          chmod 755 DEBIAN/postinst

          find usr -type f -exec chmod 644 {} \;
          find usr/lib -name '*.so*' -exec chmod 755 {} \; 2>/dev/null || true

          cd /
          dpkg-deb --build /tmp/aqua-install /libaquamarine11_${AQUAMARINE_VERSION}-anland1_arm64.deb

      - name: Verify Aquamarine installation
        if: inputs.skip_aquamarine != true
        run: |
          echo "=== Verifying Aquamarine installation ==="
          
          if ldconfig -p | grep -q libaquamarine; then
            echo "✅ Aquamarine library found"
          else
            echo "⚠️ Aquamarine library not found"
          fi

          if [ -d /usr/include/aquamarine/backend/anland ]; then
            echo "✅ Anland headers installed"
            ls -la /usr/include/aquamarine/backend/anland/
          else
            echo "❌ Anland headers NOT installed!"
            exit 1
          fi

      # ==========================================================
      # 5. Build Hyprland (Anland)
      # ==========================================================
      - name: ═══ Build Hyprland (Anland) ═══
        if: inputs.skip_hyprland != true
        run: echo "Starting Hyprland build..."

      - name: Cache Hyprland source
        id: hypr-src-cache
        if: inputs.skip_hyprland != true && inputs.clean_cache != true
        uses: actions/cache@v4
        with:
          path: ${{ env.HYPR_SRC }}-*
          key: src-hypr-${{ inputs.hyprland_version }}-${{ steps.patch-info.outputs.patch_hash }}
          restore-keys: |
            src-hypr-${{ inputs.hyprland_version }}-
            src-hypr-

      - name: Fetch Hyprland source
        if: inputs.skip_hyprland != true
        run: |
          if [ ! -d "${{ env.HYPR_SRC }}-*" ] || [ "${{ inputs.clean_cache }}" == "true" ]; then
            apt-get source ${{ env.HYPR_SRC }}=${{ inputs.hyprland_version }}
          fi
          SOURCE_DIR=$(find . -maxdepth 1 -type d -name "${{ env.HYPR_SRC }}-*" | head -1)
          if [ -z "$SOURCE_DIR" ]; then
            echo "❌ Hyprland source directory not found"
            exit 1
          fi
          echo "HYPR_SOURCE_DIR=$SOURCE_DIR" >> $GITHUB_ENV

      - name: Apply Anland patch to Hyprland
        if: inputs.skip_hyprland != true
        run: |
          echo "=========================================="
          echo "🔧 Starting patch application process"
          echo "=========================================="

          # 进入 Hyprland 源码目录
          SOURCE_DIR=$(find . -maxdepth 1 -type d -name "${{ env.HYPR_SRC }}-*" | head -1)
          if [ -z "$SOURCE_DIR" ]; then
            echo "❌ Hyprland source directory not found, fetching..."
            apt-get source ${{ env.HYPR_SRC }}=${{ inputs.hyprland_version }}
            SOURCE_DIR=$(find . -maxdepth 1 -type d -name "${{ env.HYPR_SRC }}-*" | head -1)
          fi
          echo "📁 Source directory: $SOURCE_DIR"
          cd "$SOURCE_DIR"

          # 检查补丁文件
          PATCH_FILE="../${{ env.HYPR_PATCH }}"
          echo "📄 Patch file path: $PATCH_FILE"

          if [ ! -f "$PATCH_FILE" ]; then
            echo "⚠️  Patch file not found at $PATCH_FILE"
            echo "📂 Contents of parent directory:"
            ls -la ../ | head -20
            exit 0
          fi

          echo "✅ Patch file found"
          echo ""

          # 显示补丁文件信息
          echo "📊 Patch file info:"
          echo "   Size: $(wc -c < "$PATCH_FILE") bytes"
          echo "   Lines: $(wc -l < "$PATCH_FILE") lines"
          echo "   First 5 lines:"
          head -5 "$PATCH_FILE" | sed 's/^/     /'
          echo ""

          # 检查补丁是否已应用
          echo "🔍 Checking if patch is already applied..."
          if patch -p1 --dry-run < "$PATCH_FILE" 2>/dev/null; then
            echo "✅ Patch is NOT applied, proceeding..."
          else
            echo "ℹ️  Patch is already applied or dry-run failed"
            echo "   Checking for patch markers..."
            if grep -q "anland" src/Compositor.cpp 2>/dev/null || \
               grep -q "anland" src/config/ConfigManager.cpp 2>/dev/null || \
               grep -q "ANLAND" src/Compositor.cpp 2>/dev/null; then
              echo "✅ Patch appears to be already applied (found 'anland' markers in source)"
            else
              echo "⚠️  Patch may not be applied, but dry-run failed. Attempting force apply..."
            fi
          fi
          echo ""

          # 尝试应用补丁
          echo "📦 Applying patch..."
          APPLIED=false

          # 方法1: git apply (推荐)
          echo "   [1/4] Trying git apply..."
          if git apply --verbose --ignore-space-change --ignore-whitespace "$PATCH_FILE" 2>&1; then
            echo "   ✅ git apply succeeded!"
            APPLIED=true
          else
            echo "   ⚠️  git apply failed, trying method 2..."

            # 方法2: patch with dry-run check
            echo "   [2/4] Trying patch with dry-run..."
            if patch -p1 --dry-run < "$PATCH_FILE" 2>/dev/null; then
              echo "   ✅ Dry-run succeeded, applying..."
              if patch -p1 < "$PATCH_FILE" 2>&1; then
                echo "   ✅ patch succeeded!"
                APPLIED=true
              else
                echo "   ❌ patch failed unexpectedly"
              fi
            else
              echo "   ℹ️  Dry-run indicates patch is already applied"
              APPLIED=true  # 已应用视为成功
            fi
          fi

          # 如果还没成功，尝试 fuzz
          if [ "$APPLIED" != "true" ]; then
            echo "   [3/4] Trying patch with --fuzz=5..."
            if patch -p1 --fuzz=5 < "$PATCH_FILE" 2>&1; then
              echo "   ✅ patch with fuzz succeeded!"
              APPLIED=true
            else
              echo "   ❌ patch with fuzz failed"
            fi
          fi

          # 最后尝试强制应用
          if [ "$APPLIED" != "true" ]; then
            echo "   [4/4] Trying patch with --force..."
            if patch -p1 --force < "$PATCH_FILE" 2>&1; then
              echo "   ✅ patch with force succeeded!"
              APPLIED=true
            else
              echo "   ❌ All patch methods failed!"
            fi
          fi

          echo ""

          # 验证补丁是否真的应用了
          echo "🔍 Verifying patch application..."
          if grep -r "anland" . --include="*.cpp" --include="*.hpp" 2>/dev/null | head -3; then
            echo "✅ Found 'anland' markers in source code:"
            grep -r "anland" . --include="*.cpp" --include="*.hpp" 2>/dev/null | head -5 | sed 's/^/   /'
            echo ""
            echo "   Patch appears to be applied successfully."
          elif grep -r "ANLAND" . --include="*.cpp" --include="*.hpp" 2>/dev/null | head -3; then
            echo "✅ Found 'ANLAND' markers in source code:"
            grep -r "ANLAND" . --include="*.cpp" --include="*.hpp" 2>/dev/null | head -5 | sed 's/^/   /'
            echo ""
            echo "   Patch appears to be applied successfully."
          else
            echo "⚠️  No 'anland' markers found in source code."
            echo "   Patch may not have been applied correctly."
          fi

          echo "=========================================="
          echo "🏁 Patch application process complete"
          echo "=========================================="

      - name: Bump Hyprland changelog
        if: inputs.skip_hyprland != true
        run: |
          cd "${{ env.HYPR_SOURCE_DIR }}"
          if ! grep -q "+anland" debian/changelog; then
            dch --newversion "$(dpkg-parsechangelog --show-field Version)+anland1" "Add Anland backend support (CI build)"
          fi

      - name: Create shlibs.local
        if: inputs.skip_hyprland != true
        run: |
          cd "${{ env.HYPR_SOURCE_DIR }}"
          mkdir -p debian
          cat > debian/shlibs.local << 'EOF'
          libaquamarine 11 libaquamarine11 (>= 0.11.0)
          EOF

      # ==========================================================
      # 【简化】直接手动安装 Hyprland 构建依赖（跳过 build-dep，
      #  因为 libaquamarine-dev 被 hold 后 build-dep 总会失败）
      # ==========================================================
      - name: Install Hyprland build dependencies (manual)
        if: inputs.skip_hyprland != true
        run: |
          cd "${{ env.HYPR_SOURCE_DIR }}"
          
          echo "📦 Ensure our build Aquamarine is not overwritten..."
          dpkg -r libaquamarine-dev 2>/dev/null || true
          dpkg -r libaquamarine11 2>/dev/null || true
          apt-mark hold libaquamarine-dev 2>/dev/null || true
          
          echo "📦 Installing Hyprland build dependencies manually..."
          apt-get install -y -t trixie-backports --no-install-recommends \
            libxkbcommon-dev wayland-protocols \
            libinput-dev \
            libhyprutils-dev libhyprlang-dev \
            libhyprcursor-dev libhyprgraphics-dev libhyprwire-dev \
            hyprland-protocols \
            libpipewire-0.3-dev libspa-0.2-dev \
            || echo "⚠️ Some packages from backports not available, may need sid"
          
          # 尝试从 sid 安装不可用的包
          apt-get install -y -t sid --no-install-recommends \
            hyprland-protocols \
            || echo "⚠️ hyprland-protocols not in sid either, may use subproject fallback"
          
          # 验证我们编译的 Anland 头文件未被覆盖
          echo "=== Verifying Anland headers after install ==="
          if [ -d /usr/include/aquamarine/backend/anland ]; then
            echo "✅ Anland headers still present"
            ls -la /usr/include/aquamarine/backend/anland/
          else
            echo "❌ Anland headers missing! Our built version was overwritten."
            echo "   Attempting to reinstall from compiled source..."
            cd /__w/aquamarine/aquamarine/aquamarine
            make install
            if [ -d /usr/include/aquamarine/backend/anland ]; then
              echo "✅ Restored our Anland headers"
            else
              echo "❌ Still missing"
              echo "HAS_ANLAND_HEADERS=false" >> $GITHUB_ENV
            fi
          fi

      - name: Build Hyprland .deb
        if: inputs.skip_hyprland != true
        run: |
          cd "${{ env.HYPR_SOURCE_DIR }}"
          ldconfig
          
          export PKG_CONFIG_PATH="/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/local/lib/pkgconfig:/usr/share/pkgconfig:${PKG_CONFIG_PATH}"
          
          echo "=== Building Hyprland with Anland support ==="
          echo "PKG_CONFIG_PATH: $PKG_CONFIG_PATH"
          
          if [ -d /usr/include/aquamarine/backend/anland ]; then
            echo "✅ Anland headers found"
            ls -la /usr/include/aquamarine/backend/anland/
          else
            echo "❌ Anland headers NOT found!"
            exit 1
          fi
          
          DEB_BUILD_OPTIONS="nocheck" \
          dpkg-buildpackage -b -uc -us -d -j$(nproc)

      # ==========================================================
      # 6. Collect and upload artifacts
      # ==========================================================
      - name: Collect artifacts
        run: |
          mkdir -p artifacts

          if [ -f /libaquamarine11_*.deb ]; then
            cp /libaquamarine11_*.deb artifacts/
          fi

          if [ "${{ inputs.skip_hyprland }}" != "true" ]; then
            find . -maxdepth 1 -name "*.deb" -type f | while read -r deb; do
              filename=$(basename "$deb")
              case "$filename" in
                hyprland_[0-9]*.deb|hyprland-backgrounds_*.deb)
                  if ! echo "$filename" | grep -q "dbgsym\|dev"; then
                    cp "$deb" artifacts/
                  fi
                  ;;
              esac
            done
          fi

          echo "=== 📦 Artifacts ==="
          ls -la artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anland-debs
          path: artifacts/*.deb
          retention-days: 7

      - name: Build summary
        run: |
          cat > $GITHUB_STEP_SUMMARY << 'EOF'
          ## 🏗️ Build Summary

          | Item | Status |
          |------|--------|
